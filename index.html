<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saudagar Fitness Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-slate-50 text-slate-900 pb-10">
    <div
      id="loginScreen"
      class="fixed inset-0 bg-emerald-600 z-[100] flex flex-col items-center justify-center p-6"
    >
      <div
        class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center"
      >
        <div
          class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4"
        >
          <i class="fas fa-dumbbell text-3xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-emerald-900 mb-2">
          Saudagar Fitness
        </h1>
        <p class="text-slate-500 mb-6">Enter Owner PIN</p>
        <input
          type="password"
          id="pinInput"
          placeholder="••••"
          class="w-full text-center text-3xl tracking-widest p-4 bg-slate-100 rounded-2xl mb-4 border-none outline-none"
        />
        <button
          onclick="handleLogin()"
          class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg"
        >
          Login
        </button>
      </div>
    </div>

    <div id="appContent" class="hidden">
      <header class="bg-emerald-700 text-white p-6 rounded-b-[40px] shadow-xl">
        <div class="flex justify-between items-center mb-6">
          <div>
            <p class="text-emerald-200 text-xs uppercase tracking-widest">
              Welcome,
            </p>
            <h1 class="text-xl font-bold">Saudagar Fitness Club</h1>
          </div>
          <button
            onclick="handleLogout()"
            class="bg-emerald-800/50 px-4 py-2 rounded-xl text-sm"
          >
            Logout <i class="fas fa-sign-out-alt ml-2"></i>
          </button>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div class="bg-white/10 p-4 rounded-2xl backdrop-blur-md">
            <p class="text-xs text-emerald-100">Total Members</p>
            <h2 class="text-2xl font-black" id="memberCount">0</h2>
          </div>
          <div class="bg-white/10 p-4 rounded-2xl backdrop-blur-md">
            <p class="text-xs text-emerald-100">Expiring Soon</p>
            <h2 class="text-2xl font-black" id="expiringCount">0</h2>
          </div>
        </div>
      </header>

      <nav class="flex mx-4 mt-4 bg-white rounded-2xl shadow-sm border border-emerald-100 p-1">
        <button
          id="tabMembers"
          onclick="switchTab('members')"
          class="tab-btn flex-1 py-3 rounded-xl font-bold text-sm bg-emerald-600 text-white"
        >
          <i class="fas fa-users mr-1"></i> Members
        </button>
        <button
          id="tabGallery"
          onclick="switchTab('gallery')"
          class="tab-btn flex-1 py-3 rounded-xl font-bold text-sm text-emerald-700"
        >
          <i class="fas fa-images mr-1"></i> Gallery
        </button>
      </nav>

      <main class="p-4">
        <section id="membersSection">
          <div class="flex justify-between items-center my-6">
            <h2 class="text-lg font-bold text-emerald-900">Member Directory</h2>
            <button
              onclick="openModal()"
              class="bg-emerald-600 text-white w-12 h-12 rounded-2xl shadow-lg flex items-center justify-center"
            >
              <i class="fas fa-plus"></i>
            </button>
          </div>
          <div id="memberList" class="space-y-4"></div>
        </section>

        <section id="gallerySection" class="hidden">
          <div class="my-6">
            <h2 class="text-lg font-bold text-emerald-900">Member Gallery</h2>
            <p class="text-xs text-slate-500 mt-1">Tap a photo to view membership card</p>
          </div>
          <div id="galleryGrid" class="grid grid-cols-3 gap-3"></div>
        </section>
      </main>
    </div>

    <div
      id="memberModal"
      class="fixed inset-0 bg-emerald-950/80 hidden z-[110] backdrop-blur-sm p-4 flex items-center justify-center"
    >
      <div
        class="bg-white w-full max-w-lg max-h-[92vh] rounded-[40px] shadow-2xl overflow-hidden border border-emerald-100 flex flex-col"
      >
        <div
          class="bg-emerald-600 p-6 text-white flex justify-between items-center"
        >
          <h2 class="text-xl font-bold">New Member Details</h2>
          <i class="fas fa-user-plus text-2xl opacity-50"></i>
        </div>

        <form id="gymForm" class="p-8 space-y-5 overflow-y-auto flex-1">
          <div class="flex flex-col items-center mb-6">
            <div class="relative group">
              <div
                id="photoPreview"
                class="w-28 h-28 bg-emerald-100 rounded-full border-4 border-white shadow-lg flex items-center justify-center overflow-hidden"
              >
                <i class="fas fa-camera text-3xl text-emerald-400"></i>
              </div>
              <label
                for="mPhoto"
                class="absolute bottom-0 right-0 bg-emerald-600 text-white w-10 h-10 rounded-full flex items-center justify-center cursor-pointer border-4 border-white shadow-md active:scale-90 transition-transform"
              >
                <i class="fas fa-plus"></i>
                <input
                  type="file"
                  id="mPhoto"
                  accept="image/*"
                  capture="environment"
                  class="hidden"
                />
              </label>
            </div>
            <p
              class="text-[10px] font-bold text-emerald-700 mt-2 uppercase tracking-tighter"
            >
              Tap plus to take photo
            </p>
          </div>
          <div class="relative">
            <i class="fas fa-user absolute left-4 top-4 text-emerald-500"></i>
            <input
              type="text"
              id="mName"
              placeholder="Full Name"
              class="nice-input pl-12"
              required
            />
          </div>

          <div class="relative">
            <i
              class="fab fa-whatsapp absolute left-4 top-4 text-emerald-500 font-bold text-lg"
            ></i>
            <input
              type="tel"
              id="mPhone"
              placeholder="WhatsApp Number"
              class="nice-input pl-12"
              required
            />
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div class="relative">
              <span
                class="absolute right-4 top-4 text-xs font-bold text-slate-400"
                >KG</span
              >
              <input
                type="number"
                id="mWeight"
                placeholder="Weight"
                class="nice-input"
              />
            </div>
            <div class="relative">
              <span
                class="absolute right-4 top-4 text-xs font-bold text-slate-400"
                >CM</span
              >
              <input
                type="number"
                id="mHeight"
                placeholder="Height"
                class="nice-input"
              />
            </div>
          </div>

          <div class="space-y-1">
            <label
              class="text-[10px] uppercase tracking-widest font-black text-emerald-600 ml-2"
              >Joining Date</label
            >
            <input
              type="date"
              id="mDate"
              class="nice-input cursor-pointer"
              required
            />
          </div>

          <div class="space-y-2">
            <label
              class="text-[10px] uppercase tracking-widest font-black text-emerald-600 ml-2"
              >Choose Plan</label
            >
            <div class="grid grid-cols-2 gap-2">
              <label class="plan-card">
                <input
                  type="radio"
                  name="plan"
                  value="1"
                  class="hidden"
                  checked
                />
                <span>1 Mo</span>
              </label>
              <label class="plan-card">
                <input type="radio" name="plan" value="3" class="hidden" />
                <span>3 Mo</span>
              </label>
              <label class="plan-card">
                <input type="radio" name="plan" value="6" class="hidden" />
                <span>6 Mo</span>
              </label>
              <label class="plan-card">
                <input type="radio" name="plan" value="12" class="hidden" />
                <span>1 Year</span>
              </label>
            </div>
          </div>

          <label class="bg-amber-50 border border-amber-200 rounded-2xl p-4 flex items-center gap-3 cursor-pointer">
            <input type="checkbox" id="mAdmission" class="w-5 h-5 accent-amber-600 rounded" />
            <div class="w-10 h-10 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center shrink-0">
              <i class="fas fa-receipt"></i>
            </div>
            <div class="flex-1">
              <p class="text-xs font-black text-amber-800 uppercase tracking-wider">Admission Fee (Optional)</p>
              <p class="text-lg font-black text-amber-900">₹200 <span class="text-xs font-bold text-amber-600">— tick if collected</span></p>
            </div>
          </label>

          <div class="flex gap-4 pt-4">
            <button
              type="button"
              onclick="closeModal()"
              class="flex-1 py-4 text-slate-400 font-bold hover:bg-slate-50 rounded-2xl transition-all"
            >
              Cancel
            </button>
            <button
              type="submit"
              class="flex-1 py-4 bg-emerald-600 text-white rounded-2xl font-bold shadow-lg shadow-emerald-200 hover:bg-emerald-700 active:scale-95 transition-all"
            >
              Save Member
            </button>
          </div>
        </form>
      </div>
    </div>

    <div
      id="cardModal"
      class="fixed inset-0 bg-emerald-950/80 hidden z-[120] backdrop-blur-sm p-4 flex items-center justify-center"
    >
      <div class="bg-white w-full max-w-md rounded-[32px] shadow-2xl overflow-hidden">
        <div class="bg-emerald-600 p-5 text-white flex justify-between items-center">
          <h2 class="text-lg font-bold">Membership Card</h2>
          <button onclick="closeCardModal()" class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="p-4">
          <div id="cardPreviewArea" class="rounded-2xl overflow-hidden shadow-lg mb-4"></div>
          <button
            id="sendWhatsAppBtn"
            onclick="shareCardOnWhatsApp()"
            class="w-full py-4 bg-emerald-500 text-white rounded-2xl font-bold shadow-lg flex items-center justify-center gap-2"
          >
            <i class="fab fa-whatsapp text-xl"></i> Send on WhatsApp
          </button>
        </div>
      </div>
    </div>

    <div id="cardRenderTarget" class="card-render-offscreen"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
