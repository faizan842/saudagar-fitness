<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saudagar Fitness Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-slate-50 text-slate-900 pb-10">
    <div
      id="loginScreen"
      class="fixed inset-0 bg-emerald-600 z-[100] flex flex-col items-center justify-center p-6"
    >
      <div
        class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center"
      >
        <div
          class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4"
        >
          <i class="fas fa-dumbbell text-3xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-emerald-900 mb-2">
          Saudagar Fitness
        </h1>
        <p class="text-slate-500 mb-6">Enter Owner PIN</p>
        <input
          type="password"
          id="pinInput"
          placeholder="••••"
          class="w-full text-center text-3xl tracking-widest p-4 bg-slate-100 rounded-2xl mb-4 border-none outline-none"
        />
        <button
          onclick="handleLogin()"
          class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg"
        >
          Login
        </button>
      </div>
    </div>

    <div id="appContent" class="hidden">
      <header class="bg-gradient-to-br from-emerald-800 to-emerald-600 text-white p-6 rounded-b-[48px] shadow-xl shadow-emerald-950/10">
        <div class="flex justify-between items-center mb-6">
          <div>
            <p class="text-emerald-200 text-xs font-bold uppercase tracking-widest">
              Welcome,
            </p>
            <h1 class="text-xl font-black tracking-tight">Saudagar Fitness Club</h1>
          </div>
          <button
            onclick="handleLogout()"
            class="bg-white/10 hover:bg-white/20 active:scale-95 transition-all px-4 py-2 rounded-xl text-sm font-semibold border border-white/10"
          >
            Logout <i class="fas fa-sign-out-alt ml-2"></i>
          </button>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div class="bg-white/10 p-4 rounded-2xl backdrop-blur-md border border-white/10 shadow-inner">
            <p class="text-xs text-emerald-100 font-bold uppercase tracking-wider">Monthly</p>
            <h2 class="text-3xl font-black mt-1" id="monthlyTotal">₹0</h2>
          </div>
          <div class="bg-white/10 p-4 rounded-2xl backdrop-blur-md border border-white/10 shadow-inner">
            <p class="text-xs text-emerald-100 font-bold uppercase tracking-wider">Yearly</p>
            <h2 class="text-3xl font-black mt-1" id="yearlyTotal">₹0</h2>
          </div>
        </div>
      </header>

      <main class="p-5 max-w-md mx-auto">
        <div class="flex justify-between items-center my-6">
          <h2 class="text-lg font-black text-emerald-950 tracking-tight">Member Directory</h2>
          <button
            onclick="openModal()"
            class="bg-emerald-600 hover:bg-emerald-500 hover:scale-105 active:scale-95 transition-all text-white w-12 h-12 rounded-2xl shadow-lg shadow-emerald-600/25 flex items-center justify-center"
          >
            <i class="fas fa-plus text-lg"></i>
          </button>
        </div>

        <div id="memberList" class="space-y-4"></div>
      </main>
    </div>

    <!-- Modal Container: now scrolls naturally on small screens -->
    <div
      id="memberModal"
      class="fixed inset-0 bg-emerald-950/60 hidden z-[110] backdrop-blur-md p-4 overflow-y-auto flex justify-center items-start sm:items-center transition-all duration-300"
    >
      <div
        class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl border border-emerald-100/50 my-auto overflow-hidden"
      >
        <div
          class="bg-gradient-to-r from-emerald-700 to-emerald-600 p-6 text-white flex justify-between items-center"
        >
          <div>
            <h2 class="text-xl font-black tracking-tight">New Member</h2>
            <p class="text-xs text-emerald-100">Add info to sync with cloud</p>
          </div>
          <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center border border-white/10">
            <i class="fas fa-user-plus text-lg"></i>
          </div>
        </div>

        <form id="gymForm" class="p-6 space-y-4">
          <div class="flex flex-col items-center mb-6">
            <div
              id="photoPreview"
              class="w-28 h-28 bg-emerald-100 rounded-full border-4 border-white shadow-lg flex items-center justify-center overflow-hidden mb-3"
            >
              <i class="fas fa-camera text-3xl text-emerald-400"></i>
            </div>
            
            <div class="flex gap-3">
              <!-- Camera Option -->
              <label
                for="mPhotoCamera"
                class="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold rounded-xl flex items-center gap-1.5 cursor-pointer shadow-md active:scale-95 transition-all"
              >
                <i class="fas fa-camera"></i> Take Photo
                <input
                  type="file"
                  id="mPhotoCamera"
                  accept="image/*"
                  capture="environment"
                  class="hidden"
                />
              </label>
              
              <!-- Gallery Option -->
              <label
                for="mPhotoGallery"
                class="px-3 py-1.5 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 text-xs font-bold rounded-xl flex items-center gap-1.5 cursor-pointer border border-emerald-200 active:scale-95 transition-all"
              >
                <i class="fas fa-images"></i> Gallery
                <input
                  type="file"
                  id="mPhotoGallery"
                  accept="image/*"
                  class="hidden"
                />
              </label>
            </div>
          </div>
          <div class="relative">
            <i class="fas fa-user absolute left-4 top-4 text-emerald-500"></i>
            <input
              type="text"
              id="mName"
              placeholder="Full Name"
              class="nice-input pl-12"
              required
            />
          </div>

          <div class="relative">
            <i
              class="fab fa-whatsapp absolute left-4 top-4 text-emerald-500 font-bold text-lg"
            ></i>
            <input
              type="tel"
              id="mPhone"
              placeholder="WhatsApp Number"
              class="nice-input pl-12"
              required
            />
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div class="relative">
              <span
                class="absolute right-4 top-4 text-xs font-bold text-slate-400"
                >KG</span
              >
              <input
                type="number"
                id="mWeight"
                placeholder="Weight"
                class="nice-input"
              />
            </div>
            <div class="relative">
              <span
                class="absolute right-4 top-4 text-xs font-bold text-slate-400"
                >CM</span
              >
              <input
                type="number"
                id="mHeight"
                placeholder="Height"
                class="nice-input"
              />
            </div>
          </div>

          <div class="space-y-1">
            <label
              class="text-[10px] uppercase tracking-widest font-black text-emerald-600 ml-2"
              >Joining Date</label
            >
            <input
              type="date"
              id="mDate"
              class="nice-input cursor-pointer"
              required
            />
          </div>

          <div class="space-y-2">
            <label
              class="text-[10px] uppercase tracking-widest font-black text-emerald-600 ml-2"
              >Choose Plan</label
            >
            <div class="grid grid-cols-3 gap-2">
              <label class="plan-card">
                <input
                  type="radio"
                  name="plan"
                  value="1"
                  class="hidden"
                  checked
                />
                <span>1 Mo</span>
              </label>
              <label class="plan-card">
                <input type="radio" name="plan" value="3" class="hidden" />
                <span>3 Mo</span>
              </label>
              <label class="plan-card">
                <input type="radio" name="plan" value="12" class="hidden" />
                <span>1 Year</span>
              </label>
            </div>
          </div>

          <!-- Admission Fee Checkbox -->
          <div class="flex items-center gap-3 p-3 bg-emerald-50 rounded-2xl border border-emerald-100/50">
            <input 
              type="checkbox" 
              id="mAdmissionFee" 
              value="200" 
              class="w-5 h-5 rounded text-emerald-600 focus:ring-emerald-500 border-emerald-300 cursor-pointer"
            />
            <label for="mAdmissionFee" class="text-xs font-bold text-emerald-800 cursor-pointer select-none">
              Include Admission Fee (+₹200)
            </label>
          </div>

          <div class="flex gap-4 pt-2">
            <button
              type="button"
              onclick="closeModal()"
              class="flex-1 py-4 text-slate-500 hover:text-slate-700 font-bold hover:bg-slate-100/60 rounded-2xl active:scale-95 transition-all text-sm"
            >
              Cancel
            </button>
            <button
              type="submit"
              class="flex-1 py-4 bg-emerald-600 hover:bg-emerald-700 active:scale-95 text-white rounded-2xl font-bold shadow-lg shadow-emerald-600/20 transition-all text-sm"
            >
              Save Member
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
